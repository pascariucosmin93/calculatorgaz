apiVersion: v1
kind: Namespace
metadata:
  name: gaz
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-infraejobs
  namespace: gaz
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {"auths":{"registry.infraejobs.ro":{"username":"ci-registry","password":"devops","auth":"Y2ktcmVnaXN0cnk6ZGV2b3Bz"}}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculatorgaz
  namespace: gaz
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calculatorgaz
  template:
    metadata:
      labels:
        app: calculatorgaz
    spec:
      imagePullSecrets:
        - name: registry-infraejobs
      initContainers:
        - name: ensure-db-gaz
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              value: devops
          command:
            - sh
            - -ec
            - |
              until pg_isready -h postgres.postgress.svc.cluster.local -p 5432 -U devops; do
                sleep 2
              done
              if ! psql -h postgres.postgress.svc.cluster.local -p 5432 -U devops -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='gaz'" | grep -q 1; then
                psql -h postgres.postgress.svc.cluster.local -p 5432 -U devops -d postgres -c "CREATE DATABASE gaz"
              fi
      containers:
        - name: calculatorgaz
          image: registry.infraejobs.ro/infra/gaz/calculatorgaz:kube
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: HOSTNAME
              value: 0.0.0.0
            - name: DATABASE_URL
              value: postgresql://devops:devops@postgres.postgress.svc.cluster.local:5432/gaz
            - name: BILLING_SERVICE_URL
              value: http://billing-service.gaz.svc.cluster.local:8080
            - name: REPORTING_SERVICE_URL
              value: http://reporting-service.gaz.svc.cluster.local:8081
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service.gaz.svc.cluster.local:8082
            - name: AUTH_SERVICE_URL
              value: http://auth-service.gaz.svc.cluster.local:8083
            - name: ADMIN_EMAIL
              value: admin@gmail.com
            - name: ADMIN_PASSWORD
              value: admin
            - name: NEXT_PUBLIC_ADMIN_EMAIL
              value: admin@gmail.com
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: calculatorgaz
  namespace: gaz
  labels:
    cilium.io/lb-pool: pool-2
    cilium.io/bgp-advertise: "true"
spec:
  type: LoadBalancer
  selector:
    app: calculatorgaz
  ports:
    - name: http
      port: 80
      targetPort: 3000
