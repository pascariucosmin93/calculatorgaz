apiVersion: v1
kind: Namespace
metadata:
  name: gaz-test
---
apiVersion: v1
kind: Secret
metadata:
  name: registry-infraejobs
  namespace: gaz-test
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {"auths":{"registry.infraejobs.ro":{"username":"ci-registry","password":"devops","auth":"Y2ktcmVnaXN0cnk6ZGV2b3Bz"}}}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculatorgaz-test
  namespace: gaz-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calculatorgaz-test
  template:
    metadata:
      labels:
        app: calculatorgaz-test
    spec:
      imagePullSecrets:
        - name: registry-infraejobs
      initContainers:
        - name: ensure-db-gaz-test
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              value: devops
          command:
            - sh
            - -ec
            - |
              until pg_isready -h postgres.postgress.svc.cluster.local -p 5432 -U devops; do
                sleep 2
              done
              if ! psql -h postgres.postgress.svc.cluster.local -p 5432 -U devops -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='gaz_test'" | grep -q 1; then
                psql -h postgres.postgress.svc.cluster.local -p 5432 -U devops -d postgres -c "CREATE DATABASE gaz_test"
              fi
      containers:
        - name: calculatorgaz-test
          image: registry.infraejobs.ro/infra/gaz/calculatorgaz:pr-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: HOSTNAME
              value: 0.0.0.0
            - name: DATABASE_URL
              value: postgresql://devops:devops@postgres.postgress.svc.cluster.local:5432/gaz_test
            - name: ADMIN_EMAIL
              value: admin@gmail.com
            - name: ADMIN_PASSWORD
              value: admin
            - name: NEXT_PUBLIC_ADMIN_EMAIL
              value: admin@gmail.com
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: calculatorgaz-test
  namespace: gaz-test
  labels:
    cilium.io/lb-pool: pool-2
    cilium.io/bgp-advertise: "true"
spec:
  type: LoadBalancer
  selector:
    app: calculatorgaz-test
  ports:
    - name: http
      port: 80
      targetPort: 3000
