name: Tests (Docker Separate)

on:
  pull_request:
    branches:
      - main
    paths:
      - "gaz-nextjs/**"
      - ".github/workflows/tests-docker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-docker-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests-docker:
    runs-on: docker-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tests
        run: |
          cd gaz-nextjs
          if [ -f package-lock.json ]; then
            npm ci --ignore-scripts
          else
            npm install --ignore-scripts
          fi
          npm run test
