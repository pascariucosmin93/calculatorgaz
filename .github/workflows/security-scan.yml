name: Security Scanning (Dependencies & SAST)

on:
  push:
    branches:
      - main
    paths:
      - "gaz-nextjs/**"
      - ".github/workflows/security-scan.yml"
  pull_request:
    branches:
      - main
    paths:
      - "gaz-nextjs/**"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-scan-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  npm-audit:
    name: NPM Audit (Dependencies)
    runs-on: docker-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq and tools
        run: |
          if command -v apt-get &> /dev/null; then
            apt-get update && apt-get install -y jq
          elif command -v apk &> /dev/null; then
            apk add --no-cache jq
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "gaz-nextjs/package-lock.json"

      - name: Install dependencies
        working-directory: gaz-nextjs
        run: npm ci --ignore-scripts

      - name: Run npm audit
        working-directory: gaz-nextjs
        run: |
          echo "=== NPM Audit Results ==="
          npm audit --json > npm-audit.json || true
          if [ -f npm-audit.json ]; then
            CRITICAL=$(jq '[.vulnerabilities[] | select(.severity=="critical")] | length' npm-audit.json)
            echo "Critical vulnerabilities found: $CRITICAL"
            if [ "$CRITICAL" -gt 0 ]; then
              echo "❌ CRITICAL vulnerabilities detected! Build blocked."
              exit 1
            fi
            echo "✅ No critical vulnerabilities"
          fi

      - name: Upload npm audit results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: npm-audit-report
          path: gaz-nextjs/npm-audit.json
          retention-days: 30

  semgrep-sast:
    name: Semgrep SAST (Code Analysis)
    runs-on: docker-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq and semgrep
        run: |
          if command -v apt-get &> /dev/null; then
            apt-get update && apt-get install -y jq python3-pip
            pip3 install semgrep
          elif command -v apk &> /dev/null; then
            apk add --no-cache jq py3-pip
            pip3 install semgrep
          fi

      - name: Run Semgrep scan
        working-directory: gaz-nextjs
        run: |
          semgrep \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/typescript \
            --json \
            --output=semgrep-report.json \
            . || true

      - name: Check Semgrep results for CRITICAL
        working-directory: gaz-nextjs
        run: |
          if [ -f semgrep-report.json ]; then
            CRITICAL=$(jq '[.results[] | select(.extra.severity=="CRITICAL")] | length' semgrep-report.json 2>/dev/null || echo 0)
            TOTAL=$(jq '.results | length' semgrep-report.json 2>/dev/null || echo 0)
            echo "=== Semgrep Findings ==="
            echo "Total issues: $TOTAL"
            echo "CRITICAL issues: $CRITICAL"
            if [ "$CRITICAL" -gt 0 ]; then
              echo "❌ CRITICAL code issues found! Build blocked."
              exit 1
            fi
            echo "✅ No critical code issues"
          fi

      - name: Upload Semgrep results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: semgrep-report
          path: gaz-nextjs/semgrep-report.json
          retention-days: 30

  trivy-filesystem:
    name: Trivy Filesystem Scan
    runs-on: docker-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan (check CRITICAL)
        uses: aquasec/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "gaz-nextjs"
          format: "json"
          output: "trivy-filesystem.json"
          severity: "CRITICAL"
          exit-code: "1"

      - name: Run Trivy filesystem scan (all for reporting)
        if: always()
        uses: aquasec/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "gaz-nextjs"
          format: "sarif"
          output: "trivy-filesystem.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy filesystem artifact
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: trivy-filesystem-report
          path: trivy-filesystem.sarif
          retention-days: 30

  sbom-generation:
    name: Generate SBOM (Syft)
    runs-on: docker-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          path: gaz-nextjs
          format: spdx-json
          output-file: sbom-spdx.json

      - name: Generate SBOM (CycloneDX format)
        uses: anchore/sbom-action@v0
        with:
          path: gaz-nextjs
          format: cyclonedx-json
          output-file: sbom-cyclonedx.json

      - name: Upload SBOM artifacts
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: sbom-reports
          path: |
            sbom-spdx.json
            sbom-cyclonedx.json
          retention-days: 30

  license-check:
    name: License Compliance Check
    runs-on: docker-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "gaz-nextjs/package-lock.json"

      - name: Install dependencies
        working-directory: gaz-nextjs
        run: npm ci --ignore-scripts

      - name: Check licenses
        working-directory: gaz-nextjs
        continue-on-error: true
        run: |
          npm install -g license-checker
          license-checker \
            --json > licenses.json \
            --onlyAllow "MIT,Apache-2.0,BSD,ISC,MPL-2.0" \
            || true

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: license-report
          path: gaz-nextjs/licenses.json
          retention-days: 30

  summary:
    name: Security Summary
    needs: [npm-audit, semgrep-sast, trivy-filesystem, sbom-generation, license-check]
    runs-on: docker-tests
    if: always()
    steps:
      - name: Download all reports
        uses: actions/download-artifact@v3

      - name: Create summary
        run: |
          echo "## 🔒 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ NPM Audit: [View Report](npm-audit-report/npm-audit.json)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Semgrep SAST: [View Report](semgrep-report/semgrep-report.json)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Trivy Filesystem: [View Report](trivy-filesystem-report/trivy-filesystem.sarif)" >> $GITHUB_STEP_SUMMARY
          echo "✅ SBOM Generated: SPDX & CycloneDX formats" >> $GITHUB_STEP_SUMMARY
          echo "✅ License Check: [View Report](license-report/licenses.json)" >> $GITHUB_STEP_SUMMARY

  check-status:
    name: Security Gate - Pass/Fail
    needs: [npm-audit, semgrep-sast, trivy-filesystem, sbom-generation, license-check, summary]
    runs-on: docker-tests
    if: always()
    steps:
      - name: Check security job status
        run: |
          if [ "${{ needs.npm-audit.result }}" == "failure" ] || \
             [ "${{ needs.semgrep-sast.result }}" == "failure" ] || \
             [ "${{ needs.trivy-filesystem.result }}" == "failure" ] || \
             [ "${{ needs.license-check.result }}" == "failure" ]; then
            echo "❌ Security scanning found critical issues!"
            echo "Review reports and fix before proceeding to build."
            exit 1
          fi
          echo "✅ Security gates passed! Safe to build."
          exit 0
