name: Build & Push (kube)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: registry.infraejobs.ro
  IMAGE_NAME: infra/gaz/calculatorgaz
  REGISTRY_USER: ci-registry
  REGISTRY_PASSWORD: devops
  SSH_JUMP_HOST: 10.13.13.100
  SSH_K8S_HOST: 192.168.70.3

jobs:
  build-and-push:
    runs-on: docker25
    steps:
      - name: Ensure Docker CLI is available
        run: |
          if command -v docker >/dev/null 2>&1; then
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update -y
            apt-get install -y docker.io
            exit 0
          fi
          if command -v apk >/dev/null 2>&1; then
            apk update
            apk add docker docker-cli
            exit 0
          fi
          echo "No package manager (apt/apk) available to install docker CLI." >&2
          exit 1

      - name: Ensure Node is available for JS actions
        run: |
          if command -v node >/dev/null 2>&1; then
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update -y
            apt-get install -y nodejs npm
            exit 0
          fi
          if command -v apk >/dev/null 2>&1; then
            apk update
            apk add nodejs npm
            exit 0
          fi
          echo "No package manager (apt/apk) available to install node." >&2
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set SHORT_SHA
        id: vars
        run: echo "short_sha=$(echo $GITHUB_SHA | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Login to private registry
        run: |
          echo "$REGISTRY_PASSWORD" | docker login $REGISTRY -u $REGISTRY_USER --password-stdin

      - name: Build image for kube
        run: |
          cd gaz-nextjs
          IMAGE_REF="$REGISTRY/$IMAGE_NAME"
          docker build \
            -t $IMAGE_REF:kube \
            -t $IMAGE_REF:${{ steps.vars.outputs.short_sha }} \
            .

      # - name: Scan image for vulnerabilities (Trivy)
      #   run: |
      #     IMAGE_REF="$REGISTRY/$IMAGE_NAME"
      #     docker pull docker.io/aquasec/trivy:0.56.2
      #     docker run --rm \
      #       -v /var/run/docker.sock:/var/run/docker.sock \
      #       docker.io/aquasec/trivy:0.56.2 \
      #       image \
      #       --scanners vuln \
      #       --severity CRITICAL \
      #       --ignore-cve CVE-2023-45853 \
      #       --exit-code 1 \
      #       $IMAGE_REF:kube

      - name: Push kube tag
        run: |
          IMAGE_REF="$REGISTRY/$IMAGE_NAME"
          docker push $IMAGE_REF:kube

      - name: Push commit tag
        run: |
          IMAGE_REF="$REGISTRY/$IMAGE_NAME"
          docker push $IMAGE_REF:${{ steps.vars.outputs.short_sha }}

      - name: Run Smoke Tests In Cluster
        run: |
          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 root@"$SSH_JUMP_HOST" \
            "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10 root@\"$SSH_K8S_HOST\" 'bash -s'" <<'EOF'
          set -euo pipefail

          NS="gaz"
          TAG="$(date +%s)"

          echo "Smoke 1/2: Discord notify"
          kubectl -n "$NS" run ci-curl-notify --rm -i --restart=Never \
            --image=curlimages/curl:8.10.1 -- \
            -sS -X POST http://notification-service.${NS}.svc.cluster.local:8082/notify \
            -H 'Content-Type: application/json' \
            -d "{\"message\":\"CI SMOKE NOTIFY\",\"details\":{\"tag\":\"$TAG\",\"source\":\"kube-build.yml\"}}"

          echo "Smoke 2/2: signup + reading"
          USER="ci${TAG}"
          EMAIL="${USER}@example.com"
          PASS="parola123"
          BASE_URL="http://calculatorgaz.${NS}.svc.cluster.local"

          SIGNUP_BODY="$(kubectl -n "$NS" run ci-curl-signup --rm -i --restart=Never \
            --image=curlimages/curl:8.10.1 -- \
            -sS -X POST "$BASE_URL/api/auth/signup" \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"$USER\",\"email\":\"$EMAIL\",\"password\":\"$PASS\"}")"

          USER_ID="$(printf '%s' "$SIGNUP_BODY" | sed -n 's/.*\"id\":\"\([^\"]*\)\".*/\1/p')"
          if [ -z "$USER_ID" ]; then
            echo "Signup failed: $SIGNUP_BODY"
            exit 1
          fi

          READING_BODY="$(kubectl -n "$NS" run ci-curl-reading --rm -i --restart=Never \
            --image=curlimages/curl:8.10.1 -- \
            -sS -X POST "$BASE_URL/api/readings" \
            -H 'Content-Type: application/json' \
            -d "{\"userId\":\"$USER_ID\",\"previousReading\":120.5,\"currentReading\":132.9,\"pcs\":10.548,\"gasPriceMwh\":171.44,\"transportPriceMwh\":13.8,\"distributionPriceMwh\":70.96,\"cap26PriceMwh\":-20.54,\"cap6PriceMwh\":-0.063,\"fixedFee\":0,\"vatRate\":0.21,\"includeVat\":true}")"

          READING_ID="$(printf '%s' "$READING_BODY" | sed -n 's/.*\"id\":\"\([^\"]*\)\".*/\1/p')"
          if [ -z "$READING_ID" ]; then
            echo "Reading create failed: $READING_BODY"
            exit 1
          fi

          echo "Smoke tests passed. userId=$USER_ID readingId=$READING_ID tag=$TAG"
          EOF
