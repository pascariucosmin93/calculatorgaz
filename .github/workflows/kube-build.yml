name: Build & Push (kube)

on:
  push:
    branches:
      - ggh
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-push-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: registry.infraejobs.ro
  IMAGE_NAME: infra/gaz/calculatorgaz
  OCR_IMAGE_NAME: infra/gaz/ocr-service
  REGISTRY_USER: ${{ secrets.DOCKER_USER }}
  REGISTRY_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
  FORGEJO_URL: https://forgejo-kube.cosmin-lab.com
  GITOPS_REPO: https://forgejo-kube.cosmin-lab.com/cosmin/gaz-gitops.git

jobs:
  wait-for-security:
    name: Wait for Security Scans
    runs-on: ubuntu-latest
    steps:
      - name: Security gate check
        run: |
          echo "🔒 Security scans completed on this push"
          echo "✅ Proceeding with build after security checks"

  build-and-push:
    name: Build & Push to Registry
    needs: wait-for-security
    runs-on: ubuntu-latest
    steps:
      - name: Ensure Docker CLI is available
        run: |
          if command -v docker >/dev/null 2>&1; then
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update -y
            apt-get install -y docker.io
            exit 0
          fi
          if command -v apk >/dev/null 2>&1; then
            apk update
            apk add docker docker-cli
            exit 0
          fi
          echo "No package manager (apt/apk) available to install docker CLI." >&2
          exit 1

      - name: Ensure Node is available for JS actions
        run: |
          if command -v node >/dev/null 2>&1; then
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update -y
            apt-get install -y nodejs npm
            exit 0
          fi
          if command -v apk >/dev/null 2>&1; then
            apk update
            apk add nodejs npm
            exit 0
          fi
          echo "No package manager (apt/apk) available to install node." >&2
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set SHORT_SHA
        id: vars
        run: echo "short_sha=$(echo $GITHUB_SHA | cut -c1-6)" >> $GITHUB_OUTPUT

      - name: Login to private registry
        run: |
          echo "$REGISTRY_PASSWORD" | docker login $REGISTRY -u $REGISTRY_USER --password-stdin

      - name: NPM Audit - Check dependencies before build
        run: |
          cd gaz-nextjs
          npm ci --ignore-scripts
          echo "=== NPM Audit Results ==="
          npm audit --audit-level=moderate || echo "⚠️  Dependencies have moderate/high vulnerabilities - review carefully"

      - name: Build calculatorgaz image
        run: |
          cd gaz-nextjs
          IMAGE_REF="$REGISTRY/$IMAGE_NAME"
          docker build \
            -t $IMAGE_REF:${{ steps.vars.outputs.short_sha }} \
            -t $IMAGE_REF:latest \
            .

      - name: Build ocr-service image
        run: |
          cd ocr-service
          IMAGE_REF="$REGISTRY/$OCR_IMAGE_NAME"
          docker build \
            -t $IMAGE_REF:${{ steps.vars.outputs.short_sha }} \
            -t $IMAGE_REF:latest \
            .

      - name: Scan images for vulnerabilities (Trivy)
        run: |
          docker pull docker.io/aquasec/trivy:latest
          for IMG in "$REGISTRY/$IMAGE_NAME" "$REGISTRY/$OCR_IMAGE_NAME"; do
            echo "=== Scanning $IMG ==="
            docker run --rm \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -v /tmp/trivy:/root/.cache/trivy \
              docker.io/aquasec/trivy:latest \
              image \
              --severity CRITICAL,HIGH \
              --exit-code 0 \
              $IMG:${{ steps.vars.outputs.short_sha }}
          done
          echo "=== Trivy Scan Complete ==="

      - name: Push commit tags
        run: |
          docker push "$REGISTRY/$IMAGE_NAME:${{ steps.vars.outputs.short_sha }}"
          docker push "$REGISTRY/$OCR_IMAGE_NAME:${{ steps.vars.outputs.short_sha }}"

      - name: Update GitOps image tags
        env:
          COMMIT_SHA: ${{ github.sha }}
          GITOPS_PUSH_USER: ${{ secrets.GITOPS_PUSH_USER }}
          GITOPS_PUSH_TOKEN: ${{ secrets.GITOPS_PUSH_TOKEN }}
        run: |
          set -e
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-6)

          if [ -z "${GITOPS_PUSH_USER:-}" ] || [ -z "${GITOPS_PUSH_TOKEN:-}" ]; then
            echo "GITOPS_PUSH_USER / GITOPS_PUSH_TOKEN not set; skipping GitOps update."
            exit 0
          fi

          AUTH_REPO=$(echo "$GITOPS_REPO" | sed "s#https://#https://${GITOPS_PUSH_USER}:${GITOPS_PUSH_TOKEN}@#")
          WORKDIR=$(mktemp -d)
          git clone "$AUTH_REPO" "$WORKDIR/gitops"
          cd "$WORKDIR/gitops"

          if [ ! -f k8s/chart/values.yaml ]; then
            echo "k8s/chart/values.yaml not found in GitOps repo"
            exit 1
          fi

          # Update both calculatorgaz and ocrService image tags
          sed -i "s|^\(\s*tag:\s*\)\".*\"|\1\"$SHORT_SHA\"|" k8s/chart/values.yaml

          if git diff --quiet; then
            echo "GitOps repo already up-to-date"
            exit 0
          fi

          git config user.name "Gaz CI Bot"
          git config user.email "gaz-ci-bot@local"
          git add k8s/chart/values.yaml
          git commit -m "chore(gitops): update image tags to $SHORT_SHA"
          git push origin main
