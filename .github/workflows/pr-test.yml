name: PR Test (Docker)

on:
  pull_request:
    branches:
      - main
    paths:
      - "gaz-nextjs/**"
      - ".github/workflows/pr-test.yml"
      - ".github/workflows/kube-build.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  REGISTRY: registry.infraejobs.ro
  IMAGE_NAME: infra/gaz/calculatorgaz
  REGISTRY_USER: ci-registry
  REGISTRY_PASSWORD: devops

concurrency:
  group: pr-test-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  docker-build-test:
    runs-on: docker25
    steps:
      - name: Ensure Docker CLI is available
        run: |
          if command -v docker >/dev/null 2>&1; then
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update -y
            apt-get install -y docker.io
            exit 0
          fi
          if command -v apk >/dev/null 2>&1; then
            apk update
            apk add docker docker-cli
            exit 0
          fi
          echo "No package manager (apt/apk) available to install docker CLI." >&2
          exit 1

      - name: Ensure Node is available for JS actions
        run: |
          if command -v node >/dev/null 2>&1; then
            exit 0
          fi
          if command -v apt-get >/dev/null 2>&1; then
            apt-get update -y
            apt-get install -y nodejs npm
            exit 0
          fi
          if command -v apk >/dev/null 2>&1; then
            apk update
            apk add nodejs npm
            exit 0
          fi
          echo "No package manager (apt/apk) available to install node." >&2
          exit 1

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tags
        id: vars
        run: |
          echo "short_sha=$(echo $GITHUB_SHA | cut -c1-8)" >> $GITHUB_OUTPUT
          echo "pr_number=${{ github.event.pull_request.number || 'manual' }}" >> $GITHUB_OUTPUT

      - name: Login to private registry
        run: |
          echo "$REGISTRY_PASSWORD" | docker login $REGISTRY -u $REGISTRY_USER --password-stdin

      - name: Build Docker image (PR validation + push)
        run: |
          cd gaz-nextjs
          IMAGE_REF="$REGISTRY/$IMAGE_NAME"
          docker build \
            -t calculatorgaz:pr-${{ github.sha }} \
            -t $IMAGE_REF:pr-${{ steps.vars.outputs.pr_number }}-${{ steps.vars.outputs.short_sha }} \
            -t $IMAGE_REF:pr-latest \
            .

      - name: Push PR image tags
        run: |
          IMAGE_REF="$REGISTRY/$IMAGE_NAME"
          docker push $IMAGE_REF:pr-${{ steps.vars.outputs.pr_number }}-${{ steps.vars.outputs.short_sha }}
          docker push $IMAGE_REF:pr-latest
