name: Build & Push to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: ghcr-build-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set SHORT_SHA
        id: vars
        run: echo "short_sha=${GITHUB_SHA::6}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # IMPORTANT: repo name lowercase (GHCR rule!)
      - name: Set image names
        id: img
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "calc=ghcr.io/$OWNER/calculatorgaz" >> $GITHUB_OUTPUT
          echo "ocr=ghcr.io/$OWNER/ocr-service" >> $GITHUB_OUTPUT

      - name: Build & push calculatorgaz
        run: |
          docker build \
            -t ${{ steps.img.outputs.calc }}:${{ steps.vars.outputs.short_sha }} \
            -t ${{ steps.img.outputs.calc }}:latest \
            ./gaz-nextjs

          docker push ${{ steps.img.outputs.calc }}:${{ steps.vars.outputs.short_sha }}
          docker push ${{ steps.img.outputs.calc }}:latest

      - name: Build & push ocr-service
        run: |
          docker build \
            -t ${{ steps.img.outputs.ocr }}:${{ steps.vars.outputs.short_sha }} \
            -t ${{ steps.img.outputs.ocr }}:latest \
            ./ocr-service

          docker push ${{ steps.img.outputs.ocr }}:${{ steps.vars.outputs.short_sha }}
          docker push ${{ steps.img.outputs.ocr }}:latest