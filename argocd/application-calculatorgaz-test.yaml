apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: calculatorgaz-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: http://forgejo.forgejo.svc.cluster.local:3000/cosmin/gaz.git
    targetRevision: main
    path: k8s/test
  destination:
    server: https://kubernetes.default.svc
    namespace: gaz-test
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
